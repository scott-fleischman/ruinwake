<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle-earth Voxel RPG</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ddd;
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 1px 1px 2px #000;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 24px;
      pointer-events: none;
      text-shadow: 1px 1px 2px #000;
    }
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ccc;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="crosshair">+</div>
  <div id="instructions">Click to play<br><br>WASD — Move<br>Mouse — Look<br>Space — Jump<br>ESC — Release mouse</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
